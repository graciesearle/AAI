services:
  ai-web:
    build:
      context: ..
      dockerfile: aai_api/Dockerfile
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ..:/app
    ports:
      - "8001:8001"
    env_file:
      - path: .env
        required: false
    environment:
      - DJANGO_DEBUG=${DJANGO_DEBUG:-1}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      - MODEL_ROOT=${MODEL_ROOT:-/app/models}
      - DEFAULT_MODEL_NAME=${DEFAULT_MODEL_NAME:-produce-quality}
      - DEFAULT_MODEL_VERSION=${DEFAULT_MODEL_VERSION:-1.0.0}
      - DEFAULT_TASK_PROFILE=${DEFAULT_TASK_PROFILE:-task2_quality}
